[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

testpaths = tests
pythonpath = src

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

markers =
    retrieval: tests for context precision and recall
    generation: tests for faithfulness and answer relevancy
    multi_turn: tests for multi-turn topic adherence
    rubric: rubric-based scoring tests
    data_creation: testset generation tests
    slow: tests that make multiple live API calls

addopts =
    -v
    --tb=short
    --strict-markers
